[tool.black]
line-length = 79
target-version = ["py310"]
skip-string-normalization = false
skip-magic-trailing-comma = false
preview = false
[tool.mypy]
python_version = "3.10"
strict = false
exclude = [
    ".venv/",
    ".git/",
    "__pycache__/"
]
[tool.flake8]
max-line-length = 79
extend-ignore = ["E203", "W503", "F401"]
extend-exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".mypy_cache"
]
count = true
statistics = true
show-source = true
show-pep8-errors = true
toml-config = "pyproject.toml"